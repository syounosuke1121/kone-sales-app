<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0f172a"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-title" content="K-One営業"><link rel="apple-touch-icon" href="./icon-192.PNG"><link rel="manifest" href="./manifest.webmanifest"><title>K-One営業</title><style>
:root{--bg:#f4f7fb;--card:#fff;--ink:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--navy:#0f172a;--green:#16a34a;--orange:#ea580c;--red:#dc2626}*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Sans","Yu Gothic",sans-serif}body{padding-bottom:calc(80px + env(safe-area-inset-bottom))}header{position:sticky;top:0;z-index:20;background:var(--navy);color:#fff;padding:calc(13px + env(safe-area-inset-top)) 16px 13px}header h1{font-size:18px;margin:0}header p{font-size:11px;color:#cbd5e1;margin:4px 0 0}main{max-width:820px;margin:auto;padding:14px}.view{display:none}.view.active{display:block}h2{font-size:22px;margin:2px 0 14px}h3{font-size:16px;margin:0 0 10px}.card,.item,.stat{background:#fff;border:1px solid var(--line);border-radius:17px;padding:14px;margin-bottom:11px}.grid,.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px}.stat b{font-size:27px;display:block}.stat span,.meta{font-size:11px;color:var(--muted)}.quick button{min-height:80px;border:0;border-radius:15px;color:#fff;font-weight:800}.m{background:#2563eb}.t{background:#16a34a}.r{background:#ea580c}.c{background:#7c3aed}label{display:block;font-size:13px;font-weight:800;margin:12px 0 6px}input,textarea,select{width:100%;font-size:16px;border:1px solid #cbd5e1;border-radius:12px;background:#fff;padding:12px;min-height:48px}textarea{min-height:100px}.primary,.secondary{border-radius:12px;font-weight:800;min-height:48px;padding:11px}.primary{width:100%;border:0;background:var(--blue);color:#fff;margin-top:13px}.secondary{border:1px solid #cbd5e1;background:#fff}.orange{background:var(--orange);color:#fff;border:0}.actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.actions button{flex:1;min-width:110px}.item-title{font-weight:800}.body{font-size:14px;line-height:1.6;white-space:pre-wrap;margin-top:8px}.tag{font-size:11px;background:#eff6ff;color:#1d4ed8;padding:4px 8px;border-radius:999px}.head{display:flex;justify-content:space-between;gap:8px}.notice{font-size:12px;line-height:1.6;color:#475569;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:10px}.bottom{position:fixed;left:0;right:0;bottom:0;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);background:#fff;border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}.bottom button{border:0;background:#fff;padding:10px 1px;font-size:10px;color:var(--muted);font-weight:700}.bottom button.active{background:#eff6ff;color:var(--blue)}.hidden{display:none}.segment{display:grid;grid-template-columns:1fr 1fr;background:#e2e8f0;border-radius:12px;padding:3px;margin-bottom:12px}.segment button{border:0;background:transparent;padding:9px;border-radius:9px;font-weight:800}.segment button.active{background:#fff;color:var(--blue)}
</style></head><body><header><h1>オフィスケイワン営業アプリ</h1><p>情報はアプリ、予定はGoogleカレンダー、行動はリマインダー</p></header><main>
<section id="home" class="view active"><h2>ホーム</h2><div class="grid"><div class="stat"><b id="mc">0</b><span>商談</span></div><div class="stat"><b id="tc">0</b><span>専門用語</span></div><div class="stat"><b id="rc">0</b><span>タスク候補</span></div><div class="stat"><b id="cc">0</b><span>予定候補</span></div></div><div class="card"><h3>すぐに登録</h3><div class="quick"><button class="m" onclick="go('meetings')">商談メモ</button><button class="t" onclick="go('terms')">専門用語</button><button class="r" onclick="openAction('reminder')">リマインダー</button><button class="c" onclick="openAction('calendar')">カレンダー</button></div></div><div class="card"><h3>直近の記録</h3><div id="recent"></div></div></section>
<section id="meetings" class="view"><h2>商談メモ</h2><div class="card"><label>商談日</label><input type="date" id="md"><label>会社名・顧客名</label><input id="client"><label>相手の役職</label><input id="role"><label>相手の課題</label><textarea id="problem"></textarea><label>提案内容</label><textarea id="proposal"></textarea><label>次回アクション</label><textarea id="next"></textarea><label>期限・次回予定</label><input type="datetime-local" id="due"><button class="primary" onclick="saveMeeting()">保存</button><div class="actions"><button class="secondary orange" onclick="meetingReminder()">リマインダーへ</button><button class="secondary" onclick="meetingCalendar()">Googleカレンダーへ</button></div></div><div id="meetingList"></div></section>
<section id="terms" class="view"><h2>専門用語</h2><div class="card"><label>専門用語</label><input id="term"><label>どこで出たか</label><input id="context"><label>聞いた説明・自分の予想</label><textarea id="guess"></textarea><label>調べた意味</label><textarea id="meaning"></textarea><label>営業での使い方</label><textarea id="usage"></textarea><label>理解度</label><select id="level"><option value="1">1 未理解</option><option value="2">2 なんとなく</option><option value="3">3 説明できる</option><option value="4">4 商談で使える</option></select><button class="primary" onclick="saveTerm()">保存</button></div><div id="termList"></div></section>
<section id="actions" class="view"><h2>予定・タスク連携</h2><div class="segment"><button id="rb" class="active" onclick="switchA('reminder')">リマインダー</button><button id="cb" onclick="switchA('calendar')">Googleカレンダー</button></div><div id="reminderPanel"><div class="card"><label>タスク名</label><input id="rname"><label>期限</label><input type="datetime-local" id="rdue"><label>メモ</label><textarea id="rmemo"></textarea><button class="primary orange" onclick="saveReminder()">保存してリマインダーへ</button><p class="notice">iPhoneの共有画面が開いたら「リマインダー」を選択してください。</p></div><div id="reminderList"></div></div><div id="calendarPanel" class="hidden"><div class="card"><label>予定名</label><input id="ctitle"><label>開始</label><input type="datetime-local" id="cstart"><label>終了</label><input type="datetime-local" id="cend"><label>場所</label><input id="clocation"><label>詳細</label><textarea id="cdetails"></textarea><button class="primary" onclick="saveCalendar()">保存してGoogleカレンダーを開く</button></div><div id="calendarList"></div></div></section>
<section id="settings" class="view"><h2>設定</h2><div class="card"><h3>バックアップ</h3><p class="notice">データはこのiPhone内に保存されます。機種変更前にバックアップしてください。</p><button class="primary" onclick="backup()">書き出す</button><label>読み込む</label><input type="file" accept="application/json" onchange="restore(event)"></div></section></main>
<nav class="bottom"><button class="active" data-v="home">ホーム</button><button data-v="meetings">商談</button><button data-v="terms">用語</button><button data-v="actions">予定・タスク</button><button data-v="settings">設定</button></nav>
<script>
const $=x=>document.getElementById(x),K='kone_v2_',load=k=>JSON.parse(localStorage.getItem(K+k)||'[]'),save=(k,v)=>localStorage.setItem(K+k,JSON.stringify(v));let meetings=load('meetings'),terms=load('terms'),reminders=load('reminders'),calendars=load('calendars');const esc=s=>String(s||'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));function now(){let d=new Date();d.setMinutes(d.getMinutes()-d.getTimezoneOffset());return d.toISOString().slice(0,16)}function add(v,m){let d=new Date(v);d.setMinutes(d.getMinutes()+m-d.getTimezoneOffset());return d.toISOString().slice(0,16)}
document.querySelectorAll('.bottom button').forEach(b=>b.onclick=()=>go(b.dataset.v));function go(v){document.querySelectorAll('.view').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.bottom button').forEach(x=>x.classList.toggle('active',x.dataset.v===v));$(v).classList.add('active');render();scrollTo(0,0)}function openAction(t){go('actions');switchA(t)}function switchA(t){$('reminderPanel').classList.toggle('hidden',t!=='reminder');$('calendarPanel').classList.toggle('hidden',t!=='calendar');$('rb').classList.toggle('active',t==='reminder');$('cb').classList.toggle('active',t==='calendar')}
async function share(title,text){if(!text)return alert('内容を入力してください');if(navigator.share){try{return await navigator.share({title,text})}catch(e){}}await navigator.clipboard.writeText(text);alert('コピーしました。リマインダーに貼り付けてください')}
function saveMeeting(){if(!$('client').value.trim())return alert('会社名を入力してください');meetings.unshift({id:Date.now(),date:$('md').value,client:$('client').value.trim(),role:$('role').value.trim(),problem:$('problem').value.trim(),proposal:$('proposal').value.trim(),next:$('next').value.trim(),due:$('due').value,at:new Date().toISOString()});save('meetings',meetings);render();alert('保存しました')}
function meetingReminder(){share('次回アクション',[$('next').value,$('client').value&&'顧客：'+$('client').value,$('due').value&&'期限：'+$('due').value.replace('T',' ')].filter(Boolean).join('\\n'))}function gd(v){return v.replace(/[-:]/g,'').replace('T','')+'00'}function openCal(t,s,e,l,d){open('https://calendar.google.com/calendar/render?action=TEMPLATE&text='+encodeURIComponent(t)+'&dates='+gd(s)+'/'+gd(e)+'&location='+encodeURIComponent(l||'')+'&details='+encodeURIComponent(d||''),'_blank')}function meetingCalendar(){if(!$('due').value)return alert('日時を入力してください');openCal(($('client').value||'顧客')+' 次回打合せ',$('due').value,add($('due').value,60),'',$('next').value)}
function saveTerm(){if(!$('term').value.trim())return alert('用語を入力してください');terms.unshift({id:Date.now(),term:$('term').value.trim(),context:$('context').value.trim(),guess:$('guess').value.trim(),meaning:$('meaning').value.trim(),usage:$('usage').value.trim(),level:$('level').value,at:new Date().toISOString()});save('terms',terms);render();alert('保存しました')}
async function saveReminder(){if(!$('rname').value.trim())return alert('タスク名を入力してください');let r={id:Date.now(),name:$('rname').value.trim(),due:$('rdue').value,memo:$('rmemo').value.trim()};reminders.unshift(r);save('reminders',reminders);render();share(r.name,[r.name,r.due&&'期限：'+r.due.replace('T',' '),r.memo].filter(Boolean).join('\\n'))}
function saveCalendar(){if(!$('ctitle').value.trim()||!$('cstart').value||!$('cend').value)return alert('予定名・開始・終了を入力してください');let c={id:Date.now(),title:$('ctitle').value.trim(),start:$('cstart').value,end:$('cend').value,location:$('clocation').value.trim(),details:$('cdetails').value.trim()};calendars.unshift(c);save('calendars',calendars);render();openCal(c.title,c.start,c.end,c.location,c.details)}
function shareReminderById(id){const x=reminders.find(v=>v.id===id);if(x)share(x.name,[x.name,x.due&&'期限：'+x.due.replace('T',' '),x.memo].filter(Boolean).join('\n'))}
function openCalendarById(id){const x=calendars.find(v=>v.id===id);if(x)openCal(x.title,x.start,x.end,x.location,x.details)}
function render(){
  $('mc').textContent=meetings.length;
  $('tc').textContent=terms.length;
  $('rc').textContent=reminders.length;
  $('cc').textContent=calendars.length;
  $('recent').innerHTML=[
    ...meetings.map(x=>({at:x.at,l:'商談：'+x.client})),
    ...terms.map(x=>({at:x.at,l:'用語：'+x.term}))
  ].sort((a,b)=>String(b.at).localeCompare(String(a.at))).slice(0,5)
   .map(x=>'<div class="item"><b>'+esc(x.l)+'</b></div>').join('') || '<div class="notice">まだ記録がありません</div>';
  $('meetingList').innerHTML=meetings.map(x=>'<div class="item"><div class="head"><b>'+esc(x.client)+'</b><span class="tag">商談</span></div><div class="meta">'+esc(x.date||'')+'</div><div class="body"><b>課題</b><br>'+esc(x.problem)+'<br><br><b>次回</b><br>'+esc(x.next)+'</div></div>').join('');
  $('termList').innerHTML=terms.map(x=>'<div class="item"><div class="head"><b>'+esc(x.term)+'</b><span class="tag">理解度 '+esc(x.level)+'</span></div><div class="body">'+esc(x.meaning||'未調査')+'</div></div>').join('');
  $('reminderList').innerHTML=reminders.map(x=>'<div class="item"><b>'+esc(x.name)+'</b><div class="meta">'+esc((x.due||'').replace('T',' '))+'</div><div class="actions"><button class="secondary orange" onclick="shareReminderById('+x.id+')">リマインダーへ</button></div></div>').join('');
  $('calendarList').innerHTML=calendars.map(x=>'<div class="item"><b>'+esc(x.title)+'</b><div class="meta">'+esc((x.start||'').replace('T',' '))+'</div><div class="actions"><button class="secondary" onclick="openCalendarById('+x.id+')">Googleカレンダー</button></div></div>').join('');
}
function backup(){let a=document.createElement('a'),b=new Blob([JSON.stringify({meetings,terms,reminders,calendars},null,2)],{type:'application/json'});a.href=URL.createObjectURL(b);a.download='kone-backup.json';a.click()}function restore(e){let r=new FileReader();r.onload=()=>{let d=JSON.parse(r.result);meetings=d.meetings||[];terms=d.terms||[];reminders=d.reminders||[];calendars=d.calendars||[];save('meetings',meetings);save('terms',terms);save('reminders',reminders);save('calendars',calendars);render()};r.readAsText(e.target.files[0])}
$('md').value=new Date().toISOString().slice(0,10);$('rdue').value=now();$('cstart').value=now();$('cend').value=add(now(),60);render();if('serviceWorker'in navigator)addEventListener('load',()=>navigator.serviceWorker.register('./sw.js?v=4'));
</script></body></html>
